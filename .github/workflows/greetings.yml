name: Greetings
# https://github.com/marketplace/actions/first-interaction

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/first-interaction@v3
      with:
        issue_message: 'Ahoy!'
        pr_message: 'Ahoy!'
