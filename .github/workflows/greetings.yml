name: Greetings
# https://github.com/marketplace/actions/first-interaction

on:
  issues:
    types:
      - opened
  pull_request_target:
    types:
      - opened

permissions:
  contents: read

jobs:
  greet-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
      issues: write
    steps:
    - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
      with:
        repo_token: ${{ github.token }}
        issue_message: 'Ahoy!'
        pr_message: 'Ahoy!'

  greet-pull-request:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
      with:
        repo_token: ${{ github.token }}
        issue_message: 'Ahoy!'
        pr_message: 'Ahoy!'
